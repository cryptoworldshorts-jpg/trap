<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trap Balkan — Official Layout</title>
    <style>
        body { background: #070707; color: #f4eee8; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        /* HEADER */
        .site-header { border-bottom: 1px solid #222; padding: 20px 0; display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
        .brand { display: flex; align-items: center; gap: 15px; }
        .logo { width: 50px; height: 50px; border-radius: 50%; border: 1px solid #333; }
        .brand-title { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .social-nav { display: flex; gap: 15px; }
        .social-nav a { color: #888; text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: color 0.3s; }
        
        /* HERO SEKCIJA - H1 + FEATURED VIDEO */
        .hero-section { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; padding: 40px 0; }
        h1 { font-size: 3rem; line-height: 1.2; margin: 0; }
        .featured-video { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden; }
        .featured-video iframe { width: 100%; height: 100%; border: none; }
        
        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-top: 40px; }
        .card { background: #111; padding: 15px; border-radius: 20px; border: 1px solid #222; }
        .video-box { width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 15px; }
        .video-box iframe { width: 100%; height: 100%; border: none; }
        
        button { background: #b6202a; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header class="site-header">
        <div class="brand">
            <img src="https://i.postimg.cc/XNPBvX1b/Logo-TB.png" class="logo" alt="Logo">
            <div class="brand-title">Trap Balkan</div>
        </div>
        <nav class="social-nav">
            <a href="#">Spotify</a>
            <a href="#">FB</a>
            <a href="#">TikTok</a>
            <a href="#">Instagram</a>
        </nav>
    </header>

    <!-- HERO SEKCIJA (H1 + VIDEO) -->
    <section class="hero-section">
        <div>
            <h1>Sve pjesme na jednom mjestu</h1>
            <p>Najnoviji trap hitovi s Balkana, ekskluzivno na jednom mjestu.</p>
        </div>
        <div class="featured-video">
            <iframe src="https://www.youtube.com/embed/IZcITfepWFw"></iframe>
        </div>
    </section>

    <!-- GRID SA KARTICAMA -->
    <div class="grid">
        <div class="card">
            <div class="video-box"><iframe src="https://www.youtube.com/embed/IZcITfepWFw"></iframe></div>
            <h3>Asfaltni Dug</h3>
            <button>Lyrics</button>
        </div>
        <!-- Dodaj ostale kartice ovdje -->
    </div>
</div>

</body>
</html>
