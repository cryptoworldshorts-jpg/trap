<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trap Balkan | Official</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; color: #fff; font-family: 'Arial', sans-serif; line-height: 1.6; }
        
        /* Header & Logo */
        header { padding: 20px 50px; display: flex; align-items: center; }
        .logo-box { width: 60px; height: 60px; margin-right: 20px; }
        .logo-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #00d4ff; }
        
        /* Hero sekcija */
        .hero { text-align: center; padding: 100px 20px; }
        h1 { font-size: 3rem; color: #00d4ff; text-transform: uppercase; letter-spacing: 5px; }
        
        /* Grid za muziku */
        .music-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; padding: 50px; }
        .song-card { background: #161616; padding: 20px; border-radius: 10px; border: 1px solid #333; transition: 0.3s; }
        .song-card:hover { border-color: #00d4ff; transform: translateY(-5px); }
        
        /* Social linkovi */
        .socials { text-align: center; padding: 50px; }
        .socials a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; border-bottom: 2px solid #00d4ff; }
        
        footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="https://i.postimg.cc/XNPBvX1b/Logo-TB.png" alt="Trap Balkan Logo">
        </div>
        <nav><h2>Trap Balkan</h2></nav>
    </header>

    <section class="hero">
        <h1>Balkan Trap Sound</h1>
        <p>Nova generacija muzike. Ekskluzivno.</p>
    </section>

    <div class="music-grid">
        <div class="song-card"><h3>Singl #1</h3><p>Uskoro na svim platformama.</p></div>
        <div class="song-card"><h3>Singl #2</h3><p>Uskoro na svim platformama.</p></div>
        <div class="song-card"><h3>Singl #3</h3><p>Uskoro na svim platformama.</p></div>
    </div>

    <section class="socials">
        <h3>Prati nas</h3>
        <br>
        <a href="#">Instagram</a>
        <a href="#">YouTube</a>
        <a href="#">TikTok</a>
    </section>

    <footer>&copy; 2026 Trap Balkan. All rights reserved.</footer>

</body>
</html>
