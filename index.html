<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Trap Balkan | HQ</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Arial', sans-serif; margin: 0; }
        
        /* Premium Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 5px solid #d32f2f; background: #111; }
        .logo-box { display: flex; align-items: center; gap: 15px; }
        .logo-box img { height: 70px; border-radius: 50%; border: 2px solid #fff; }
        .social-nav a { color: #fff; margin-left: 20px; text-decoration: none; font-weight: bold; border: 1px solid #d32f2f; padding: 5px 10px; }

        /* Hero sekcija - fokus na video */
        .hero { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding: 60px 5%; }
        .premium-frame { border: 10px solid #d32f2f; padding: 15px; background: #000; box-shadow: 0 0 40px #d32f2f; }
        
        /* Grid 3 videa */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 0 5% 50px 5%; }
        .video-box { border: 5px solid #fff; padding: 5px; }
        iframe { width: 100%; height: 250px; display: block; }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="https://i.postimg.cc/XNPBvX1b/Logo-TB.png" alt="Logo">
            <h1>TRAP BALKAN</h1>
        </div>
        <nav class="social-nav">
            <a href="#">SPOTIFY</a><a href="#">IG</a><a href="#">TIKTOK</a>
        </nav>
    </header>

    <section class="hero">
        <div>
            <h1>OKANA OKANA</h1>
            <p>Novi zvuk, nova energija. Cijeli tekst dostupan na linku ispod.</p>
            <a href="#" style="background: #d32f2f; color: #fff; padding: 15px 30px; text-decoration: none;">PROČITAJ TEKST</a>
        </div>
        <div class="premium-frame">
            <iframe src="https://www.youtube.com/embed/fjzgBXjaAcc"></iframe>
        </div>
    </section>

    <div class="grid-container">
        <div class="video-box"><iframe src="https://www.youtube.com/embed/fjzgBXjaAcc"></iframe></div>
        <div class="video-box"><iframe src="https://www.youtube.com/embed/fjzgBXjaAcc"></iframe></div>
        <div class="video-box"><iframe src="https://www.youtube.com/embed/fjzgBXjaAcc"></iframe></div>
    </div>

</body>
</html>
