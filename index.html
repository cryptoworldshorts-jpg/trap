<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trap Balkan | Official HQ</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* HEADER */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; border-bottom: 2px solid #222; background: #0a0a0a; 
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #d32f2f; }
        .nav-links a { color: #aaa; margin-left: 25px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }

        /* HERO SEKCIJA (Tekst lijevo, Video desno) */
        .hero-section { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px; 
            padding: 60px 5%; align-items: center; 
        }
        .hero-text h1 { font-size: 3.5rem; line-height: 1.1; margin-bottom: 20px; }
        .hero-video { background: #121212; padding: 15px; border-radius: 20px; border: 1px solid #333; }
        iframe { width: 100%; height: 350px; border-radius: 12px; }

        /* BENTO GRID (3 u redu) */
        .bento-container { max-width: 90%; margin: 0 auto 50px auto; }
        .bento-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .card { background: #121212; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .card iframe { height: 200px; }

        @media (max-width: 900px) { .hero-section, .bento-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="https://i.postimg.cc/XNPBvX1b/Logo-TB.png" alt="Logo">
            <h2>TRAP BALKAN</h2>
        </div>
        <nav class="nav-links">
            <a href="#">PLAYER</a><a href="#">PJESME</a><a href="#">LYRICS</a>
        </nav>
    </header>

    <!-- Hero Sekcija -->
    <section class="hero-section">
        <div class="hero-text">
            <h1>SVE PJESME NA JEDNOM MJESTU</h1>
            <p>Najnoviji trap hitovi iz prve ruke. Klikni i slušaj.</p>
        </div>
        <div class="hero-video">
            <iframe src="https://www.youtube.com/embed/fjzgBXjaAcc" frameborder="0"></iframe>
        </div>
    </section>

    <!-- Grid od 3 -->
    <div class="bento-container">
        <div class="bento-grid">
            <div class="card"><h3>Okana Okana</h3><iframe src="https://www.youtube.com/embed/fjzgBXjaAcc" frameborder="0"></iframe></div>
            <div class="card"><h3>Pjesma 2</h3><iframe src="https://www.youtube.com/embed/fjzgBXjaAcc" frameborder="0"></iframe></div>
            <div class="card"><h3>Pjesma 3</h3><iframe src="https://www.youtube.com/embed/fjzgBXjaAcc" frameborder="0"></iframe></div>
        </div>
    </div>

</body>
</html>
