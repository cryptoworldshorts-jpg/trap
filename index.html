<!DOCTYPE html>
<html lang="bs" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trap Balkan — Production Layout</title>
  <!-- Ovdje je tvoj originalni CSS -->
  <style>
    /* ... (Ovdje ostavi sav tvoj originalni CSS iz prvog koda) ... */
    :root,[data-theme="dark"]{--bg:#070707;--surface:#111111;--surface2:#181818;--border:rgba(255,255,255,.09);--text:#f4eee8;--primary:#b6202a;--rxl:1.75rem;}
    body{background:var(--bg);color:var(--text);font-family:sans-serif;margin:0;}
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
    .modal.active { display: flex; }
    .modal-content { background: var(--surface); max-width: 500px; width: 100%; padding: 30px; border-radius: 20px; position: relative; border: 1px solid var(--border); }
    .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 24px; color: var(--muted); }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="site-header">
     <div class="container nav">
        <div class="brand">
          <div class="brand-logo"><img src="https://i.postimg.cc/XNPBvX1b/Logo-TB.png" alt="Trap Balkan logo"></div>
          <div class="brand-copy"><span class="brand-title">Trap Balkan</span></div>
        </div>
     </div>
  </header>

  <main>
    <!-- FEATURED -->
    <section class="hero container">
       <div class="player-shell panel" id="player">
          <div class="video-wrap">
             <iframe id="mainPlayer" src="https://www.youtube.com/embed/IZcITfepWFw" allowfullscreen></iframe>
          </div>
          <h2 id="mainTitle" style="margin-top:20px;">Asfaltni Dug</h2>
       </div>
    </section>

    <!-- KATALOG -->
    <section class="container">
      <div class="video-grid">
         <!-- KARTICA 1 -->
         <article class="video-card">
            <div class="video-thumb" onclick="playVideo('https://www.youtube.com/embed/IZcITfepWFw', 'Asfaltni Dug')"></div>
            <h3>Asfaltni Dug</h3>
            <button onclick="otvoriTekst('modal-1')">Lyrics</button>
         </article>

         <!-- KARTICA 2 -->
         <article class="video-card">
            <div class="video-thumb" onclick="playVideo('https://www.youtube.com/embed/fjzgBXjaAcc', 'Drugi Video')"></div>
            <h3>Drugi Video</h3>
            <button onclick="otvoriTekst('modal-2')">Lyrics</button>
         </article>
      </div>
    </section>
  </main>

  <!-- MODALI (Zmelos sistem) -->
  <div id="modal-1" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="zatvoriTekst('modal-1')">&times;</span>
      <h3>Asfaltni Dug</h3>
      <p>Ovdje ide tvoj tekst pjesme...</p>
    </div>
  </div>

  <div id="modal-2" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="zatvoriTekst('modal-2')">&times;</span>
      <h3>Drugi Video</h3>
      <p>Tekst za drugi video...</p>
    </div>
  </div>

  <script>
    // Funkcija za Featured Player
    function playVideo(url, title) {
      document.getElementById('mainPlayer').src = url + "?autoplay=1";
      document.getElementById('mainTitle').innerText = title;
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // Funkcije za Zmelos modale
    function otvoriTekst(id) { document.getElementById(id).classList.add('active'); }
    function zatvoriTekst(id) { document.getElementById(id).classList.remove('active'); }
  </script>
</body>
</html>
