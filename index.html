<!DOCTYPE html>
<html lang="bs" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trap Balkan — Official Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #050505;
      --color-surface: #111111;
      --color-primary: #e63946;
      --color-text: #ffffff;
      --color-text-muted: #a0a0a0;
      --radius: 12px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--color-bg); color: var(--color-text); margin: 0; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    
    /* Player & Layout */
    .grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
    .video-card { background: var(--color-surface); padding: 15px; border-radius: var(--radius); margin-bottom: 15px; border: 1px solid #222; }
    .btn { background: var(--color-primary); color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    
    /* Lyrics Panel */
    .lyrics-box { background: var(--color-surface); padding: 20px; border-radius: var(--radius); position: sticky; top: 20px; }
    pre { white-space: pre-wrap; font-family: 'Inter', sans-serif; color: var(--color-text-muted); }

    @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="container">
  <h1>Trap Balkan</h1>
  <div class="grid">
    <!-- Katalog -->
    <div id="catalog">
      <!-- Pjesma 1 -->
      <article class="video-card" data-title="Noćni Grad" data-lyrics="[Vers 1]&#10;Hladan beton, kasni sati,&#10;u daljini zvuk se klati.&#10;Trap Balkan na traci brate,&#10;svi na podu kad se vrate.">
        <h3>Noćni Grad</h3>
        <button class="btn" onclick="playTrack(this, 'https://www.youtube.com/embed/dQw4w9WgXcQ')">Play</button>
        <button class="btn" onclick="showLyrics(this)">Lyrics</button>
      </article>

      <!-- Pjesma 2 -->
      <article class="video-card" data-title="Balkanski San" data-lyrics="[Chorus]&#10;Balkanski san, ne spavam dan,&#10;tražim svoj put, izlazan plan.&#10;Bas udara jako u glavu,&#10;pravim istoriju, pravim slavu.">
        <h3>Balkanski San</h3>
        <button class="btn" onclick="playTrack(this, 'https://www.youtube.com/embed/tgbNymZ7vqY')">Play</button>
        <button class="btn" onclick="showLyrics(this)">Lyrics</button>
      </article>
    </div>

    <!-- Sidebar -->
    <div>
      <div class="lyrics-box">
        <h2 id="currentTitle">Odaberi pjesmu</h2>
        <pre id="currentLyrics">Klikni na 'Lyrics' ispod bilo koje pjesme da vidiš tekst ovdje...</pre>
      </div>
    </div>
  </div>
</div>

<script>
  function playTrack(btn, url) {
    alert("Player bi ovdje učitao: " + url);
  }

  function showLyrics(btn) {
    const card = btn.closest('.video-card');
    const title = card.getAttribute('data-title');
    const lyrics = card.getAttribute('data-lyrics');
    
    document.getElementById('currentTitle').innerText = title;
    document.getElementById('currentLyrics').innerText = lyrics;
  }
</script>

</body>
</html>
