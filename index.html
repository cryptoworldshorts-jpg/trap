<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Trap Balkan | Music Hub</title>
    <style>
        :root { --dark: #0a0a0a; --accent: #00f2ff; /* Boja iz Logo TB.jpg */ }
        body { background: var(--dark); color: #fff; font-family: sans-serif; margin: 0; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* Logo sekcija */
        .header { text-align: center; padding: 40px 0; }
        .header img { width: 120px; border-radius: 50%; }

        /* Grid za pjesme */
        .music-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .track-card { background: #161616; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        
        /* Player i SEO linkovi */
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn { padding: 10px; border-radius: 4px; cursor: pointer; text-decoration: none; font-weight: bold; }
        .btn-play { background: var(--accent); color: #000; }
        .btn-stream { background: #333; color: #fff; }
    </style>
</head>
<body>

<header class="header">
    <img src="Logo TB.jpg" alt="Trap Balkan">
    <h1>Trap Balkan</h1>
</header>

<main class="container">
    <div class="music-grid">
        <!-- Primjer kartice pjesme -->
        <article class="track-card">
            <h3>Noćni Grad</h3>
            <div class="actions">
                <a href="#" class="btn btn-play">YouTube</a>
                <a href="#" class="btn btn-stream">Spotify</a>
            </div>
            <!-- SEO tekst (sakriven/skrolabilan) -->
            <details style="margin-top:15px; font-size: 0.9em; color: #aaa;">
                <summary>Lyrics (SEO)</summary>
                <p>Ovdje ide tekst pjesme za SEO pretragu...</p>
            </details>
        </article>
    </div>
    
    <!-- Paginacija -->
    <div style="text-align: center; margin-top: 30px;">
        <button>1</button> <button>2</button> <button>3</button>
    </div>
</main>

</body>
</html>
