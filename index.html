<!DOCTYPE html>
<html lang="bs" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Trap Balkan — Official Production</title>
    <style>
        :root { --bg: #070707; --surface: #111111; --primary: #00f2ff; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        .container { max-width: 1400px; margin: auto; padding: 20px; display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        
        /* Brand */
        .brand { text-align: center; grid-column: 1 / -1; padding: 20px; }
        .brand img { width: 80px; border-radius: 50%; border: 2px solid var(--primary); }

        /* Grid - 20 mjesta */
        .catalog { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: var(--surface); padding: 15px; border-radius: 10px; border: 1px solid #222; }
        
        /* Sidebar (Lyrics) */
        .sidebar { position: sticky; top: 20px; height: fit-content; background: var(--surface); padding: 20px; border-radius: 10px; border: 1px solid #333; }
        .btn { cursor: pointer; background: var(--primary); color: black; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand">
        <img src="Logo TB.jpg" alt="Trap Balkan">
        <h1>Trap Balkan</h1>
    </div>

    <div class="catalog" id="grid">
        <!-- Generišemo 20 kartica kroz JS -->
    </div>

    <aside class="sidebar">
        <h2 id="lyricsTitle">Lyrics</h2>
        <pre id="lyricsBody">Odaberi pjesmu...</pre>
    </aside>
</div>

<script>
    const grid = document.getElementById('grid');
    const lyricsTitle = document.getElementById('lyricsTitle');
    const lyricsBody = document.getElementById('lyricsBody');

    // Kreiramo 20 pjesama
    for (let i = 1; i <= 20; i++) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <h3>Pjesma ${i}</h3>
            <button class="btn" onclick="play('${i}')">Play</button>
            <button class="btn" onclick="showLyrics('${i}')">Lyrics</button>
        `;
        grid.appendChild(card);
    }

    function play(i) { alert("Učitavam YouTube video za pjesmu " + i); }
    function showLyrics(i) {
        lyricsTitle.innerText = "Lyrics za Pjesmu " + i;
        lyricsBody.innerText = "Ovdje će stajati tekst pjesme " + i + " za potrebe SEO optimizacije...";
    }
</script>

</body>
</html>
