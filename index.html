<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        /* Glavni Bento Container */
        .bento-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        /* Premium Kartice */
        .card { 
            background: #121212; 
            padding: 40px; 
            border-radius: 20px; 
        }

        h1 { font-size: 3.5rem; line-height: 1; margin-bottom: 20px; text-transform: uppercase; }
        
        /* Pill dugmad */
        .pill-btn { 
            background: #d32f2f; color: white; padding: 12px 25px; 
            border-radius: 50px; text-decoration: none; font-weight: bold; 
            display: inline-block; margin-right: 10px; 
        }

        /* Social bar */
        .social-bar { margin-top: 30px; display: flex; gap: 10px; }
        .social-link { background: #222; padding: 10px 20px; border-radius: 50px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="bento-grid">
    <!-- Lijeva kartica -->
    <div class="card">
        <p>TRAP BALKAN MUSIC HUB</p>
        <h1>SVE PJESME NA JEDNOM MJESTU</h1>
        <a href="#" class="pill-btn">Play featured</a>
        <a href="#" style="color:#fff; text-decoration:none;">Pogledaj pjesme</a>
        
        <div class="social-bar">
            <span class="social-link">YOUTUBE</span>
            <span class="social-link">SPOTIFY</span>
            <span class="social-link">APPLE MUSIC</span>
        </div>
    </div>

    <!-- Desna kartica (Video) -->
    <div class="card">
        <p>FEATURED PLAYER</p>
        <h3>Asfaltni Dug</h3>
        <iframe src="https://www.youtube.com/embed/fjzgBXjaAcc" style="width:100%; height:250px; border-radius:15px;"></iframe>
    </div>
</div>

</body>
</html>
