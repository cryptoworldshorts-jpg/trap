<!DOCTYPE html>
<html lang="bs" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trap Balkan — Official Production</title>
  <style>
    :root {
      --bg: #070707; --surface: #111111; --text: #ffffff;
      --primary: #b6202a; --accent: #d6ab68;
    }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; transition: background 0.5s ease; }
    .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
    .video-card { background: var(--surface); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #222; }
    .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; }
    .lyrics-box { background: var(--surface); padding: 30px; border-radius: 20px; position: sticky; top: 20px; border-top: 5px solid var(--primary); }
    #playerFrame { width: 100%; aspect-ratio: 16/9; border-radius: 10px; }
  </style>
</head>
<body>

<div class="container">
  <main>
    <h1>Trap Balkan</h1>
    <div id="playerSection">
      <iframe id="playerFrame" src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
      <h2 id="activeTitle">Odaberi pjesmu</h2>
    </div>

    <div id="catalog">
      <!-- Pjesma 1 -->
      <article class="video-card" data-title="Noćni Grad" data-video="https://www.youtube.com/embed/dQw4w9WgXcQ" data-lyrics="Hladan grad, asfalt sija,&#10;Trap Balkan se sad savija.&#10;Nema stajanja, samo gas,&#10;ovo je naš novi glas." data-color="#b6202a">
        <h3>Noćni Grad</h3>
        <button class="btn" onclick="updatePlayer(this)">Play Pjesmu</button>
      </article>

      <!-- Pjesma 2 -->
      <article class="video-card" data-title="Podrum Flow" data-video="https://www.youtube.com/embed/tgbNymZ7vqY" data-lyrics="Podrum mračan, bas se čuje,&#10;balkan ritam sad vas tuče.&#10;Svaka riječ je čista vatra,&#10;ovo je naša nova matra." data-color="#d6ab68">
        <h3>Podrum Flow</h3>
        <button class="btn" onclick="updatePlayer(this)">Play Pjesmu</button>
      </article>
    </div>
  </main>

  <aside class="lyrics-box">
    <h2 id="lyricsTitle">Lyrics</h2>
    <pre id="lyricsBody">Klikni play na bilo koju pjesmu...</pre>
  </aside>
</div>

<script>
  function updatePlayer(btn) {
    const card = btn.closest('.video-card');
    const title = card.dataset.title;
    const video = card.dataset.video;
    const lyrics = card.dataset.lyrics;
    const color = card.dataset.color;

    // Ažuriraj Player
    document.getElementById('playerFrame').src = video;
    document.getElementById('activeTitle').innerText = title;
    
    // Ažuriraj Lyrics
    document.getElementById('lyricsTitle').innerText = title;
    document.getElementById('lyricsBody').innerText = lyrics;

    // Ažuriraj Boju (Dinamički efekt)
    document.documentElement.style.setProperty('--primary', color);
    document.body.style.background = 'linear-gradient(to bottom, ' + color + '11, #070707)';
  }
</script>

</body>
</html>
