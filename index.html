<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trap Balkan | Official HQ</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid #222; }
        .logo-box { display: flex; align-items: center; gap: 15px; }
        .logo-box img { height: 50px; }
        .social-nav a { color: #fff; margin-left: 20px; text-decoration: none; font-size: 1.2rem; }

        /* Hero Sekcija */
        .hero { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding: 50px 5%; align-items: center; }
        .hero-text h1 { font-size: 3.5rem; margin: 0; color: #d32f2f; }
        .hero-video { border: 1px solid #333; padding: 10px; background: #111; border-radius: 12px; }
        iframe { width: 100%; height: 350px; border-radius: 8px; }

        /* Grid sekcija */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 50px 5%; }
        .video-card { background: #111; padding: 10px; border-radius: 10px; border: 1px solid #222; }

        @media (max-width: 768px) { .hero { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="https://i.postimg.cc/XNPBvX1b/Logo-TB.png" alt="Logo">
            <h2>TRAP BALKAN</h2>
        </div>
        <nav class="social-nav">
            <a href="#">Spotify</a>
            <a href="#">IG</a>
            <a href="#">TikTok</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h1>OKANA OKANA</h1>
            <p>Novi val balkanskog trapa. Slušaj sada na svim platformama.</p>
            <a href="#" style="background: #d32f2f; padding: 15px 30px; color: #fff; text-decoration: none; border-radius: 5px;">Slušaj odmah</a>
        </div>
        <div class="hero-video">
            <iframe src="https://www.youtube.com/embed/fjzgBXjaAcc" frameborder="0" allowfullscreen></iframe>
        </div>
    </section>

    <div class="video-grid">
        <div class="video-card"><iframe src="https://www.youtube.com/embed/..." width="100%"></iframe></div>
        <div class="video-card"><iframe src="https://www.youtube.com/embed/..." width="100%"></iframe></div>
    </div>

</body>
</html>
