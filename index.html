<!DOCTYPE html>
<html lang="bs" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trap Balkan — Official Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Ovdje je tvoj originalni CSS koji si poslao */
    :root, [data-theme="dark"] { --color-bg: #070707; --color-surface: #111111; --color-primary: #b6202a; --color-text: #f4eee8; --color-text-muted: #b6ada5; }
    body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--color-bg); color: var(--color-text); }
    .container { width: min(1440px, 95%); margin: 0 auto; }
    .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 20px; padding: 20px 0; }
    .video-card { background: var(--color-surface); padding: 20px; border-radius: 12px; border: 1px solid #333; }
    .track-btn { padding: 10px 20px; background: #222; border: 1px solid #444; color: white; cursor: pointer; border-radius: 20px; }
    .track-btn.primary { background: var(--color-primary); }
    #playerFrame { width: 100%; aspect-ratio: 16/9; border: none; }
    .lyrics-shell { position: sticky; top: 20px; }
    pre { white-space: pre-wrap; font-family: 'Inter', sans-serif; color: var(--color-text-muted); }
  </style>
</head>
<body>

<main class="container">
  <section class="main-layout">
    
    <div class="left-col">
      <div class="video-grid" id="videoGrid">
        <article class="video-card" data-title="Noćni Grad" data-video="https://www.youtube.com/embed/dQw4w9WgXcQ" data-lyrics="Tekst za Noćni Grad...">
          <h3>Noćni Grad</h3>
          <button class="track-btn primary" data-action="play">Play</button>
          <button class="track-btn" data-action="lyrics">Lyrics</button>
        </article>

        <article class="video-card" data-title="Podrum Flow" data-video="https://www.youtube.com/embed/tgbNymZ7vqY" data-lyrics="Podrum flow, zidovi pamte glas...">
          <h3>Podrum Flow</h3>
          <button class="track-btn primary" data-action="play">Play</button>
          <button class="track-btn" data-action="lyrics">Lyrics</button>
        </article>

        <article class="video-card" data-title="Beton i Sjena" data-video="https://www.youtube.com/embed/ysz5S6PUM-U" data-lyrics="Beton i sjena, hladan kadar grada...">
          <h3>Beton i Sjena</h3>
          <button class="track-btn primary" data-action="play">Play</button>
          <button class="track-btn" data-action="lyrics">Lyrics</button>
        </article>
      </div>
    </div>

    <div class="right-col">
      <section id="player" class="surface">
        <h2 id="playerTitle">Odaberi pjesmu</h2>
        <iframe id="playerFrame" src=""></iframe>
      </section>

      <section id="lyrics" class="lyrics-shell">
        <h2 id="lyricsTitle">Lyrics</h2>
        <pre id="lyricsBody">Odaberi pjesmu da vidiš tekst...</pre>
      </section>
    </div>

  </section>
</main>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const cards = document.querySelectorAll('.video-card');
    const playerFrame = document.getElementById('playerFrame');
    const playerTitle = document.getElementById('playerTitle');
    const lyricsTitle = document.getElementById('lyricsTitle');
    const lyricsBody = document.getElementById('lyricsBody');

    cards.forEach(card => {
      card.querySelector('[data-action="play"]').addEventListener('click', () => {
        playerFrame.src = card.dataset.video;
        playerTitle.textContent = card.dataset.title;
      });

      card.querySelector('[data-action="lyrics"]').addEventListener('click', () => {
        lyricsTitle.textContent = card.dataset.title;
        lyricsBody.textContent = card.dataset.lyrics;
      });
    });
  });
</script>

</body>
</html>
