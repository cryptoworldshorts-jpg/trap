<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trap Balkan | Official HQ</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* HEADER */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; border-bottom: 2px solid #222; background: #0a0a0a; 
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #d32f2f; }
        .nav-links a { color: #aaa; margin-left: 25px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }

        /* HERO I BENTO KONTEJNERI */
        .bento-container { max-width: 1400px; margin: 40px auto; padding: 0 40px; }
        
        .hero-section { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 30px; 
            align-items: stretch; 
            margin-bottom: 50px; 
        }

        /* JEDINSTVENI KARTICA STIL */
        .card { 
            background: #121212; 
            padding: 40px; 
            border-radius: 25px; 
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card iframe { 
            width: 100%; 
            height: 100%; 
            min-height: 250px; 
            border-radius: 15px; 
        }

        /* GRID OD 3 */
        .bento-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .bento-grid .card iframe { height: 200px; min-height: 200px; }

        /* SOCIAL BAR - NOVI STIL ZA IKONE */
.social-links { display: flex; gap: 15px; margin-top: 30px; flex-wrap: wrap; }
.social-links a { 
    font-size: 1.5rem;    /* Ikone su veće od teksta */
    color: #fff;          /* Bijela boja dok se ne pređe mišem */
    text-decoration: none;
    transition: 0.3s;     /* Efekat da se boja mijenja glatko */
}

/* Boje za ikone na hover (prelazak mišem) */
.yt:hover { color: #FF0000; }
.sp:hover { color: #1DB954; }
.fb:hover { color: #4267B2; }
.tt:hover { color: #00f2ea; }
.ig:hover { color: #E1306C; }

        @media (max-width: 900px) { .hero-section, .bento-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="https://i.postimg.cc/XNPBvX1b/Logo-TB.png" alt="Logo">
            <h2>TRAP BALKAN</h2>
        </div>
        <nav class="nav-links">
            <a href="#">PLAYER</a><a href="#">PJESME</a><a href="#">LYRICS</a>
        </nav>
    </header>

    <section class="hero-section bento-container">
        <div class="card">
            <h1>SVE PJESME NA JEDNOM MJESTU</h1>
            <p style="color: #aaa; margin-bottom: 30px;">Najnoviji trap hitovi iz prve ruke. Klikni i slušaj.</p>
            <!-- Ubaci ovo u <head> sekciju tvog sajta -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Zamijeni onaj stari .social-links dio ovim: -->
<div class="social-links">
    <a href="#" class="yt"><i class="fab fa-youtube"></i></a>
    <a href="#" class="sp"><i class="fab fa-spotify"></i></a>
    <a href="#" class="fb"><i class="fab fa-facebook"></i></a>
    <a href="#" class="tt"><i class="fab fa-tiktok"></i></a>
    <a href="#" class="ig"><i class="fab fa-instagram"></i></a>
</div>
        </div>
        <div class="card">
            <iframe src="https://www.youtube.com/embed/fjzgBXjaAcc" frameborder="0"></iframe>
        </div>
    </section>

    <div class="bento-container">
        <div class="bento-grid">
            <div class="card"><h3>Okana Okana</h3><iframe src="https://www.youtube.com/embed/fjzgBXjaAcc" frameborder="0"></iframe></div>
            <div class="card"><h3>Pjesma 2</h3><iframe src="https://www.youtube.com/embed/fjzgBXjaAcc" frameborder="0"></iframe></div>
            <div class="card"><h3>Pjesma 3</h3><iframe src="https://www.youtube.com/embed/fjzgBXjaAcc" frameborder="0"></iframe></div>
        </div>
    </div>

</body>
</html>
