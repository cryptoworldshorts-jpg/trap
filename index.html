<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trap Balkan | Music Hub</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        /* Header sa okruglim logom */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; border-bottom: 1px solid #333; margin-bottom: 40px; 
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #d32f2f; }
        .nav-links a { color: #fff; margin-left: 20px; text-decoration: none; font-size: 0.9rem; font-weight: bold; }

        /* Bento Grid 3 u redu */
        .bento-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .card { 
            background: #121212; 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid #222;
        }

        iframe { width: 100%; height: 180px; border-radius: 12px; margin-top: 15px; }
        
        @media (max-width: 900px) { .bento-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="https://i.postimg.cc/XNPBvX1b/Logo-TB.png" alt="Trap Balkan">
            <h2>TRAP BALKAN</h2>
        </div>
        <nav class="nav-links">
            <a href="#">PLAYER</a>
            <a href="#">PJESME</a>
            <a href="#">LYRICS</a>
        </nav>
    </header>

    <div class="bento-grid">
        <!-- Kartice (ovo samo kopiraj kad dodaješ pjesme) -->
        <div class="card">
            <h3>Asfaltni Dug</h3>
            <iframe src="https://www.youtube.com/embed/fjzgBXjaAcc" frameborder="0"></iframe>
        </div>
        <div class="card">
            <h3>Pjesma 2</h3>
            <iframe src="https://www.youtube.com/embed/fjzgBXjaAcc" frameborder="0"></iframe>
        </div>
        <div class="card">
            <h3>Pjesma 3</h3>
            <iframe src="https://www.youtube.com/embed/fjzgBXjaAcc" frameborder="0"></iframe>
        </div>
        <!-- Dodaj još kartica po potrebi -->
    </div>

</body>
</html>
